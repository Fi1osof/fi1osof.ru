mutation ethAccountNonce($address: String!) {
  ethAccountNonce(address: $address) {
    nonce
    message
  }
}

mutation authEthAccount($data: EthAccountAuthInput!) {
  response: authEthAccount(data: $data) {
    success
    message
    token
  }
}

fragment EthAccountNoNesting on EthAccount {
  id
  address
  createdAt
  userId
}
