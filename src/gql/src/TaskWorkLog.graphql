query taskWorkLogs(
  $where: TaskWorkLogWhereInput
  $skip: Int
  $take: Int
  $orderBy: TaskWorkLogOrderByInput
) {
  response: taskWorkLogs(
    where: $where
    skip: $skip
    take: $take
    orderBy: $orderBy
  ) {
    ...TaskWorkLog_
  }
}

query taskWorkLogCount($where: TaskWorkLogWhereInput) {
  response: taskWorkLogCount(where: $where)
}

query taskWorkLogsWithCount(
  $where: TaskWorkLogWhereInput
  $skip: Int
  $take: Int
) {
  taskWorkLogs(where: $where, skip: $skip, take: $take) {
    ...TaskWorkLog_
  }
  taskWorkLogCount(where: $where)
}

query taskWorkLog($where: TaskWorkLogWhereUniqueInput!) {
  response: taskWorkLog(where: $where) {
    ...TaskWorkLog_
  }
}

mutation createTaskWorkLog($data: TaskWorkLogCreateInput!) {
  response: createTaskWorkLog(data: $data) {
    ...TaskWorkLog_
  }
}

mutation deleteTaskWorkLog($where: TaskWorkLogWhereUniqueInput!) {
  response: deleteTaskWorkLog(where: $where) {
    ...TaskWorkLog_
  }
}

fragment TaskWorkLog_ on TaskWorkLog {
  ...TaskWorkLogNoNesting
}

fragment TaskWorkLogNoNesting on TaskWorkLog {
  id
  createdAt
  content
  taskId
  createdById
}
