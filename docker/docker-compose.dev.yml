version: '3.7'

services:
  traefik:
    ports:
      - 2015:80
      - 8080:8080
  app:
    environment:
      - N8N_SECURE_COOKIE=false
    volumes:
      - ../package.json:/app/package.json
      - ../next.config.js:/app/next.config.js
      - ../prisma:/app/prisma
      - ../src:/app/src
      - ../server:/app/server
    command: 'npm run dev:n8n'
    ports:
      - 3000:3000
      - 4000:4000
      - 5678:5678

  supabase:
    ports:
      - 5432:5432
  mailserver:
    ports:
      - 1025:25
      - 1465:465
      - 1587:587
      - 1143:143

  mailhog:
    ports:
      - 8025:8025

  world3d:
    volumes:
      - ./world3d/src:/app/src
    command: 'npm run dev'
    ports:
      - 4100:4100
