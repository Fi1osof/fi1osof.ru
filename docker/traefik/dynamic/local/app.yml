http:
  routers:
    n8n-webhook:
      rule: 'PathPrefix(`/webhook`)'
      entryPoints:
        - web
      service: n8n
      priority: 100

    n8n-webhook-test:
      rule: 'PathPrefix(`/webhook-test`)'
      entryPoints:
        - web
      service: n8n
      priority: 100

    n8n-mcp:
      rule: 'PathPrefix(`/mcp`)'
      entryPoints:
        - web
      service: n8n
      priority: 100

    app:
      rule: 'PathPrefix(`/`)'
      entryPoints:
        - web
      service: app
      priority: 1

    world3d:
      rule: 'PathPrefix(`/world3d-service`)'
      entryPoints:
        - web
      middlewares:
        - world3d-strip-prefix
      service: world3d
      priority: 100

  middlewares:
    world3d-strip-prefix:
      stripPrefix:
        prefixes:
          - '/world3d-service'

  services:
    app:
      loadBalancer:
        servers:
          - url: 'http://app:3000'

    n8n:
      loadBalancer:
        servers:
          - url: 'http://app:5678'

    world3d:
      loadBalancer:
        servers:
          - url: 'http://world3d:4100'
