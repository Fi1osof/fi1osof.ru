version: '3.7'

services:
  app:
    tty: true
    build:
      context: ../
      network: ${NETWORK_NAME:-agicms-default}
      args:
        - ENV_MODE=development
        - JWT_SECRET=${JWT_SECRET}
        - DATABASE_URL=${DATABASE_URL}
        - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
        - NEXT_PUBLIC_TELEGRAM_BOT_NAME=${NEXT_PUBLIC_TELEGRAM_BOT_NAME}
        - NEXT_PUBLIC_WORLD3D_WS_URL=${NEXT_PUBLIC_WORLD3D_WS_URL}
        - NEXT_PUBLIC_DEBUG_WORLD3D=${NEXT_PUBLIC_DEBUG_WORLD3D}
    volumes:
      - ../public:/app/public
      - ../shared:/app/shared
      - ../uploads:/app/uploads
      - ./mailserver/config:/app/mailserver-config
    environment:
      - ENV_MODE=development
    env_file:
      - .env

  supabase:
    image: supabase/postgres:15.1.0.147
    volumes:
      - ./supabase/data:/var/lib/postgresql/data
      # - ./supabase/init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    environment:
      - POSTGRES_PASSWORD=${SUPABASE_DB_PASSWORD:-your_supabase_password}
      - POSTGRES_DB=${SUPABASE_DB_NAME:-postgres}
    env_file:
      - .env
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10

  traefik:
    image: traefik:v3.3.6
    command:
      - '--providers.docker.network=${NETWORK_NAME:-agicms-default}'
    volumes:
      - ${TRAEFIK_STATIC_CONFIG:-./traefik/traefik.yml}:/etc/traefik/traefik.yml:ro
      - ${TRAEFIK_DYNAMIC_DIR:-./traefik/dynamic/local}:/etc/traefik/dynamic:ro
      - ./traefik/logs:/var/log/traefik
      - ./traefik/certs:/etc/traefik/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - 'traefik.enable=true'
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: ${MAIL_HOSTNAME:-mail.localhost}
    domainname: ${MAIL_DOMAIN:-localhost}
    volumes:
      - ./mailserver/mail-data:/var/mail
      - ./mailserver/mail-state:/var/mail-state
      - ./mailserver/mail-logs:/var/log/mail
      - ./mailserver/config:/tmp/docker-mailserver
    environment:
      - ENABLE_SPAMASSASSIN=${MAIL_ENABLE_SPAMASSASSIN:-0}
      - ENABLE_CLAMAV=${MAIL_ENABLE_CLAMAV:-0}
      - ENABLE_FAIL2BAN=${MAIL_ENABLE_FAIL2BAN:-0}
      - ENABLE_POSTGREY=${MAIL_ENABLE_POSTGREY:-0}
      - ONE_DIR=1
      - ENABLE_POP3=${MAIL_ENABLE_POP3:-0}
      - ENABLE_IMAP=${MAIL_ENABLE_IMAP:-1}
      - SMTP_ONLY=${MAIL_SMTP_ONLY:-0}
      - SSL_TYPE=${MAIL_SSL_TYPE:-}
      - PERMIT_DOCKER=${MAIL_PERMIT_DOCKER:-connected-networks}
      - POSTFIX_INET_PROTOCOLS=ipv4
      - DEFAULT_RELAY_HOST=[${MAIL_RELAY_HOST:-mailhog}]:${MAIL_RELAY_PORT:-1025}
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  mailhog:
    image: mailhog/mailhog

  coturn:
    image: coturn/coturn:latest
    command:
      - '--use-auth-secret'
      - '--static-auth-secret=${TURN_SECRET}'
      - '--realm=${TURN_REALM:-localhost}'
      - '--listening-port=3478'
      - '--tls-listening-port=5349'
      - '--min-port=49152'
      - '--max-port=49200'
      - '--log-file=stdout'
      - '--no-cli'
      - '--fingerprint'
    ports:
      - 3478:3478
      - 3478:3478/udp
      - 5349:5349
      - 5349:5349/udp
      - 49152-49200:49152-49200/udp

  world3d:
    build:
      context: ./world3d
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - TURN_SECRET=${TURN_SECRET}
      - TURN_REALM=${TURN_REALM:-localhost}
      - TURN_HOST=${TURN_HOST:-coturn}

networks:
  default:
    name: ${NETWORK_NAME:-agicms-default}
